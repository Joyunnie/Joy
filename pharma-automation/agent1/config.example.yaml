pm20:
  db_type: "sqlserver"
  instance: ".\\PMPLUS20"
  database: "PM_MAIN"
  auth: "windows"                     # "windows" | "sql"
  # SQL auth only:
  # username: "readonly_user"
  # password_env: "PM20_DB_PASSWORD"  # 환경변수명

  # Patient hashing (환경변수 우선)
  patient_hash_salt_env: "PM20_HASH_SALT"
  # patient_hash_salt: "직접 입력 시 (비권장)"

  # Sync 설정
  visit_lookback_days: 7              # read_recent_visits 조회 범위
  drug_master_sync_interval_hours: 24 # 약품 마스터 동기화 주기

agent:
  polling_interval_seconds: 300   # 5분
  cloud_api_url: "https://api.example.com"
  # api_key: 환경변수 PHARMA_API_KEY 사용
  sqlite_queue_path: "C:\\PM20\\Agent1\\sync_queue.db"
  max_queue_items: 10000           # P5: 큐 최대 항목 수 (초과 시 oldest 삭제)
  log_file: "C:\\PM20\\Agent1\\agent1.log"
  log_max_bytes: 10485760        # 10 MB
  log_backup_count: 5

rpa:
  enabled: false                        # true로 변경 시 RPA 모듈 활성화
  polling_interval_seconds: 2           # P35: RPA 커맨드 폴링 주기 (기본 2초)
  max_consecutive_failures: 3           # 연속 실패 시 자동 OFF
  # coordinates:                        # PM+20 화면 좌표 오버라이드 (옵션)
  #   narcotics:
  #     inventory_list_x: 200
  #     inventory_list_y: 150
  #     row_height: 22
  #     complete_button_x: 400
  #     complete_button_y: 450
  #   prescription:
  #     patient_search_x: 200
  #     patient_search_y: 60

backup:
  output_dir: "D:\\PM20_Backups"
  retention_days: 30
  retention_min_count: 3
  min_disk_space_gb: 10
  lock_file: "D:\\PM20_Backups\\.backup.lock"
